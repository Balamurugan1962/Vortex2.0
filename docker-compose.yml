services:
  db:
    image: postgres:15-alpine
    container_name: vortex-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vortex
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vortex-backend
    restart: always
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:password@db:5432/vortex
    volumes:
      - ./backend/dist:/app/dist
      - ./backend/src:/app/src
    depends_on:
      - db

volumes:
  postgres_data:
